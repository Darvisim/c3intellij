name: Review Codebase

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  review:
   runs-on: ubuntu-latest
   permissions:
     pull-requests: write
   steps:
    - name: Checkout repo
      uses: actions/checkout@v6
        
    - name: Review Code using review dog
      uses: reviewdog/action-setup@v1.4.0
      with:
        reviewdog_version: latest
        filter_mode: nofilter
